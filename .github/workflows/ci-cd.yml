name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Validate file structure
        run: |
          files=("index.html" "src/style.css" "src/algorithms.js" "src/visualizer.js" "src/app.js" "src/bigochart.js")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ Missing: $f"; exit 1; else echo "✅ Found: $f"; fi
          done

  test:
    name: 🧪 Algorithm Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/index.html)
          echo "Bundle size: ${SIZE} bytes ($(( SIZE / 1024 ))KB)"
          if [ $SIZE -gt 1048576 ]; then echo "❌ Bundle exceeds 1MB"; exit 1; fi
          echo "✅ Bundle size OK"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    name: 🏠 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 3
    steps:
      - name: Install Lighthouse
        run: npm install -g lighthouse chrome-launcher
      - name: Run Lighthouse
        run: |
          lighthouse https://pallavikailas.github.io/sorting-visualizer/ \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --output=json \
            --output=html \
            --output-path=./lighthouse-report \
            --only-categories=performance,accessibility,best-practices,seo \
            --quiet
        continue-on-error: true
      - name: Print scores
        if: always()
        run: |
          if [ -f ./lighthouse-report.report.json ]; then
            node -e "
              const r = require('./lighthouse-report.report.json');
              const c = r.categories;
              console.log('=== Lighthouse Scores ===');
              console.log('Performance:    ' + Math.round(c.performance.score * 100));
              console.log('Accessibility:  ' + Math.round(c.accessibility.score * 100));
              console.log('Best Practices: ' + Math.round(c[\"best-practices\"].score * 100));
              console.log('SEO:            ' + Math.round(c.seo.score * 100));
            "
          fi
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: ./lighthouse-report.report.html
          retention-days: 14
