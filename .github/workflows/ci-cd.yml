name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Validate file structure
        run: |
          files=("index.html" "src/style.css" "src/algorithms.js" "src/visualizer.js" "src/app.js" "src/bigochart.js")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ Missing: $f"; exit 1; else echo "✅ Found: $f"; fi
          done

  test:
    name: 🧪 Algorithm Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/index.html)
          echo "Bundle size: ${SIZE} bytes ($(( SIZE / 1024 ))KB)"
          if [ $SIZE -gt 1048576 ]; then echo "❌ Bundle exceeds 1MB"; exit 1; fi
          echo "✅ Bundle size OK"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    name: 🏠 Lighthouse Audit
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          lighthouse https://pallavikailas.github.io/sorting-visualizer/ \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --output=json \
            --output=html \
            --output-path=./lighthouse-report \
            --only-categories=performance,accessibility,best-practices,seo \
            --quiet
        continue-on-error: true

      - name: Generate badge JSON
        id: badge
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('./lighthouse-report.report.json')) {
              fs.writeFileSync('./lighthouse-badge.json', JSON.stringify({schemaVersion:1,label:'lighthouse',message:'error',color:'red'}));
              process.exit(0);
            }
            const r = JSON.parse(fs.readFileSync('./lighthouse-report.report.json'));
            const c = r.categories;
            const perf = Math.round(c.performance.score * 100);
            const a11y = Math.round(c.accessibility.score * 100);
            const bp   = Math.round(c['best-practices'].score * 100);
            const seo  = Math.round(c.seo.score * 100);
            const avg  = Math.round((perf + a11y + bp + seo) / 4);
            console.log('Performance:    ' + perf);
            console.log('Accessibility:  ' + a11y);
            console.log('Best Practices: ' + bp);
            console.log('SEO:            ' + seo);
            console.log('Average:        ' + avg);
            const color = avg >= 90 ? 'brightgreen' : avg >= 70 ? 'orange' : 'red';
            const badge = {schemaVersion:1, label:'lighthouse', message:avg+'', color};
            fs.writeFileSync('./lighthouse-badge.json', JSON.stringify(badge));
            console.log('Badge: ' + JSON.stringify(badge));
          "

      - name: Push badge to badges branch
        run: |
          # Clone just the badges branch into a separate directory
          git clone --branch badges --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/pallavikailas/sorting-visualizer.git badges-repo || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/pallavikailas/sorting-visualizer.git badges-repo && cd badges-repo && git checkout --orphan badges && git rm -rf . && cd ..
          
          # Copy badge file in
          cp ./lighthouse-badge.json badges-repo/lighthouse-badge.json
          
          # Commit and push
          cd badges-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse-badge.json
          git diff --cached --quiet || git commit -m "chore: update lighthouse badge [skip ci]"
          git push origin badges

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: ./lighthouse-report.report.html
          retention-days: 14

      - name: Upload badge JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-badge
          path: ./lighthouse-badge.json
          retention-days: 14
