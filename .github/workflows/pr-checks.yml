# ============================================================
# SortViz — PR Checks Workflow
# Adds status checks and labels to Pull Requests
# ============================================================

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-title-check:
    name: 📝 PR Title Format
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore

  diff-check:
    name: 📊 Algorithm Diff Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Summarize algorithm changes
        run: |
          echo "## Files Changed" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/main HEAD | while read f; do
            echo "- $f" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if git diff origin/main HEAD -- src/algorithms.js | grep -q "^+"; then
            echo "⚠️ **Algorithm changes detected** — please ensure tests cover new code" >> $GITHUB_STEP_SUMMARY
          fi
